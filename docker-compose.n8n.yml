version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: zenspend-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=zenspend123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_METRICS=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - zenspend-network

  postgres-n8n:
    image: postgres:15
    container_name: zenspend-n8n-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - zenspend-network

volumes:
  n8n_data:
  n8n_postgres_data:

networks:
  zenspend-network:
    driver: bridge